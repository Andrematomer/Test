<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talking Tan</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

  <h1>🐱 Talking Tan</h1>
  <p class="notice">Listen & Repeat Offline PWA Engine</p>

  <!-- Visualizer Board -->
  <div class="visualizer-container">
    <div id="state-indicator">TAP START TO ACTIVATE</div>
    <canvas id="volume-canvas"></canvas>
    <button id="btn-activate">START TALKING TAN</button>
  </div>

  <!-- Sound Customization parameters -->
  <div class="controls">
    <h2>🎛️ VOICE CONFIGURATOR</h2>

    <!-- Pitch / Speed -->
    <div class="slider-group">
      <label for="slide-speed">Cat Pitch & Speed: <span id="val-speed">1.4</span>x</label>
      <input type="range" id="slide-speed" min="1.0" max="2.0" step="0.05" value="1.4">
    </div>

    <!-- Fine Detuning -->
    <div class="slider-group">
      <label for="slide-detune">Pitch Fine-Tune (Detune): <span id="val-detune">0</span> cents</label>
      <input type="range" id="slide-detune" min="-1200" max="1200" step="50" value="0">
    </div>

    <!-- Audio Gate / Mic threshold -->
    <div class="slider-group">
      <label for="slide-gate">Gate Sensitivity (Trigger Vol): <span id="val-gate">0.03</span></label>
      <input type="range" id="slide-gate" min="0.005" max="0.1" step="0.005" value="0.03">
    </div>

    <!-- Silence Duration -->
    <div class="slider-group">
      <label for="slide-silence">Silence Timeout: <span id="val-silence">1200</span> ms</label>
      <input type="range" id="slide-silence" min="500" max="2500" step="100" value="1200">
    </div>

    <!-- Bandpass / Toy speaker Filter -->
    <div class="slider-group">
      <label for="slide-filter">Speaker Filter (Lowpass): <span id="val-filter">3000</span> Hz</label>
      <input type="range" id="slide-filter" min="1000" max="8000" step="500" value="3000">
    </div>
  </div>

  <!-- Consolidated Debug Logs Section -->
  <pre id="debug-log">[Tan System Initialized]</pre>

  <script src="app.js"></script>
</body>
</html>
