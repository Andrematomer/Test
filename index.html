<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline Loop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      overscroll-behavior-y: contain; /* Prevents pull-to-refresh gestures */
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <video id="loopPlayer" src="video.mp4" autoplay loop muted playsinline></video>

  <script>
    // Register Service Worker for offline functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.error('Registration failed', err));
      });
    }

    // Request persistent storage so the video isn't deleted by the OS
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(granted => {
        if (granted) console.log('Storage persistence granted');
      });
    }

    // Attempt to unmute video on first user interaction if blocked by browser policy
    document.body.addEventListener('click', () => {
      const video = document.getElementById('loopPlayer');
      video.muted = false;
    }, { once: true });
  </script>
</body>
</html>
