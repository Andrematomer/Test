<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline Player</title>
  
  <link rel="manifest" href="./manifest.json">
  <!-- Fixed: iOS requires PNG format for the home screen icon -->
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background-color: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      cursor: pointer;
    }

    #video-avif {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Vertical fullscreen video */
      display: block;
    }
  </style>
</head>
<body>

  <!-- Video starts playing immediately on load, loop is managed natively by the file -->
  <img id="video-avif" src="./video.avif" alt="PWA Video">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered'))
          .catch(err => console.log('SW Failed', err));
      });
    }

    const audioUrl = './audio.mp3';
    let audioContext = null;
    let audioBuffer = null;
    let rawAudioData = null;
    let isAudioPlaying = false;
    let sourceNode = null;

    // Background fetch the audio instantly as a binary buffer
    fetch(audioUrl)
      .then(res => {
        if (!res.ok) throw new Error();
        return res.arrayBuffer();
      })
      .then(arrayBuffer => {
        rawAudioData = arrayBuffer;
      })
      .catch(err => console.error('Audio load deferred'));

    // Global event listener: any touch or click anywhere triggers the sound
    const startAudio = async () => {
      if (isAudioPlaying) return;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContextClass();

      try {
        if (!rawAudioData) {
          const res = await fetch(audioUrl);
          rawAudioData = await res.arrayBuffer();
        }

        // Decode audio in-memory (no range requests needed)
        audioBuffer = await audioContext.decodeAudioData(rawAudioData.slice(0));

        sourceNode = audioContext.createBufferSource();
        sourceNode.buffer = audioBuffer;
        
        // Loop the audio indefinitely
        sourceNode.loop = true;
        
        sourceNode.connect(audioContext.destination);
        sourceNode.start(0);
        isAudioPlaying = true;

        // Remove the listeners so they don't trigger again
        document.removeEventListener('click', startAudio);
        document.removeEventListener('touchstart', startAudio);

      } catch (err) {
        console.error('Audio trigger deferred:', err);
      }
    };

    // Listen for any user interaction on the screen
    document.addEventListener('click', startAudio);
    document.addEventListener('touchstart', startAudio);
  </script>
</body>
</html>
