<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talking Tan</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

  <h1>🐱 Talking Tan</h1>
  <p class="notice">Listen & Repeat Offline PWA Engine</p>

  <!-- Visualizer Board -->
  <div class="visualizer-container">
    <div id="state-indicator">TAP START TO ACTIVATE</div>
    <canvas id="volume-canvas"></canvas>
    <button id="btn-activate">START TALKING TAN</button>
  </div>

  <!-- Auto-Target Normalizer Section -->
  <div class="controls" style="border-color: #55ff55;">
    <h2 style="color: #55ff55;">🎙️ AUTO-TARGET PITCH NORMALIZER</h2>
    <div class="slider-group" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
      <label for="check-auto-target" style="margin: 0; cursor: pointer;">Enable Auto-Pitch Targeting (Bypasses manual pitch):</label>
      <input type="checkbox" id="check-auto-target" style="width: 25px; height: 25px; cursor: pointer;">
    </div>
    
    <div class="slider-group">
      <label>Target Pitch (Hz):</label>
      <input type="number" id="num-target-pitch" value="450" style="width: 70px; background: #222; color: #55ff55; border: 1px solid #555; padding: 4px; font-family: monospace;">
      <span class="notice" style="display: block; margin-top: 5px;">(Target cartoon range: 400 - 550 Hz)</span>
    </div>

    <pre id="pitch-detector-log" style="background: #000; border-color: #444;">No voice detected yet.</pre>
  </div>

  <!-- Sound Customization parameters -->
  <div class="controls">
    <h2>🎛️ VOICE CONFIGURATOR</h2>

    <!-- Pitch / Speed (Default 1x) -->
    <div class="slider-group">
      <label for="slide-speed">Cat Pitch & Speed: <span id="val-speed">1.0</span>x</label>
      <input type="range" id="slide-speed" min="1.0" max="2.0" step="0.05" value="1.0">
    </div>

    <!-- Fine Detuning (Default 500 cents) -->
    <div class="slider-group">
      <label for="slide-detune">Pitch Fine-Tune (Detune): <span id="val-detune">500</span> cents</label>
      <input type="range" id="slide-detune" min="-1200" max="1200" step="50" value="500">
    </div>

    <!-- Gain Distortion / Bitcrusher -->
    <div class="slider-group">
      <label for="slide-distortion">Voice Distortion (Fuzz): <span id="val-distortion">0</span>%</label>
      <input type="range" id="slide-distortion" min="0" max="100" step="5" value="0">
    </div>

    <!-- Echo Delay Time -->
    <div class="slider-group">
      <label for="slide-delay">Echo Delay Time: <span id="val-delay">0</span> ms</label>
      <input type="range" id="slide-delay" min="0" max="1000" step="50" value="0">
    </div>

    <!-- Echo Feedback -->
    <div class="slider-group">
      <label for="slide-feedback">Echo Feedback (Decay): <span id="val-feedback">0</span>%</label>
      <input type="range" id="slide-feedback" min="0" max="90" step="5" value="0">
    </div>

    <!-- Tremolo (Robot shaking) -->
    <div class="slider-group">
      <label for="slide-tremolo">Tremolo/Robot Shake: <span id="val-tremolo">0</span> Hz</label>
      <input type="range" id="slide-tremolo" min="0" max="25" step="1" value="0">
    </div>

    <!-- Highpass Filter (Tiny Speaker simulation) -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-speed">Cat Pitch & Speed (PlaybackRate):</label>
        <input type="number" id="num-speed" step="0.05" value="1.0">
      </div>
      <input type="range" id="slide-speed" min="1.0" max="2.0" step="0.05" value="1.0">
    </div>

    <!-- Lowpass Filter (Muffler) -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-detune">Pitch Fine-Tune (Detune cents):</label>
        <input type="number" id="num-detune" step="50" value="500">
      </div>
      <input type="range" id="slide-detune" min="-1200" max="1200" step="50" value="500">
    </div>

    <!-- Gain Distortion / Bitcrusher -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-distortion">Voice Distortion (Fuzz %):</label>
        <input type="number" id="num-distortion" step="5" value="0">
      </div>
      <input type="range" id="slide-distortion" min="0" max="100" step="5" value="0">
    </div>

    <!-- Echo Delay Time -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-delay">Echo Delay Time (ms):</label>
        <input type="number" id="num-delay" step="50" value="0">
      </div>
      <input type="range" id="slide-delay" min="0" max="1000" step="50" value="0">
    </div>

    <!-- Echo Feedback -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-feedback">Echo Feedback (Decay %):</label>
        <input type="number" id="num-feedback" step="5" value="0">
      </div>
      <input type="range" id="slide-feedback" min="0" max="90" step="5" value="0">
    </div>

    <!-- Tremolo -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-tremolo">Tremolo/Robot Shake (Hz):</label>
        <input type="number" id="num-tremolo" step="1" value="0">
      </div>
      <input type="range" id="slide-tremolo" min="0" max="25" step="1" value="0">
    </div>

    <!-- Highpass Filter -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-highpass">Speaker Filter (Highpass Hz):</label>
        <input type="number" id="num-highpass" step="50" value="0">
      </div>
      <input type="range" id="slide-highpass" min="0" max="1500" step="50" value="0">
    </div>

    <!-- Lowpass Filter -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-lowpass">Muffle Filter (Lowpass Hz):</label>
        <input type="number" id="num-lowpass" step="500" value="8000">
      </div>
      <input type="range" id="slide-lowpass" min="1000" max="8000" step="500" value="8000">
    </div>

    <!-- Audio Gate -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-gate">Gate Sensitivity (Trigger Vol):</label>
        <input type="number" id="num-gate" step="0.005" value="0.03">
      </div>
      <input type="range" id="slide-gate" min="0.005" max="0.1" step="0.005" value="0.03">
    </div>

    <!-- Silence Duration -->
    <div class="slider-group">
      <div class="label-row">
        <label for="slide-silence">Silence Timeout (ms):</label>
        <input type="number" id="num-silence" step="100" value="1200">
      </div>
      <input type="range" id="slide-silence" min="500" max="2500" step="100" value="1200">
    </div>
  </div>

  <pre id="debug-log">[Tan System Initialized]</pre>

  <script src="app.js"></script>
</body>
</html>
