<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tan</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Map your custom icon.svg to clear favicon warnings and show up on Home Screen -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000; /* Solid black background */
      font-family: monospace;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; 
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #indicator {
      color: #55ff55;
      font-size: 24px;
      pointer-events: none;
      z-index: 50;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Tap to activate overlay (vanishes completely on load) -->
  <div id="indicator">TAP ANYWHERE TO ACTIVATE SENSORS</div>

  <!-- Import WebGL Core & Loaders -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  
  <!-- Main Script Module -->
  <script type="module" src="app.js"></script>
</body>
</html>
